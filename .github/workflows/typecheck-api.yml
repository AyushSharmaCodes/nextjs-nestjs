# .github/workflows/typecheck-api.yml
# Runs independently for the NestJS app (backend-microservices).
# Triggered only when files inside backend-microservices/ change.

name: TypeScript Safety — NestJS (backend-microservices)

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend-microservices/**'
      - '.github/workflows/typecheck-api.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend-microservices/**'
      - '.github/workflows/typecheck-api.yml'

jobs:
  typecheck:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-microservices

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-microservices/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npm run typecheck

      - name: ESLint check
        run: npm run lint

      - name: Static safety audit
        run: npm run ts-audit

  safety-gate:
    name: Safety Gate
    needs: [typecheck]
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅  backend-microservices type-safety checks passed."
