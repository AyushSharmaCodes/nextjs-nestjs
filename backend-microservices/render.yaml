# Render Blueprint — Single Deployment
# Usage: render blueprint create -f render.yaml

services:
  # ============================================
  # MERIGAUMATA API (Single Modular Monolith)
  # ============================================
  - name: merigaumata-api
    type: web
    region: singapore
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: node dist/main.js
    autoDeploy: true
    healthCheckPath: /health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DB_HOST
        fromDatabase:
          name: merigaumata-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: merigaumata-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: merigaumata-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: merigaumata-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: merigaumata-db
          property: database
      - key: DB_SSL
        value: "true"
      - key: CORS_ORIGIN
        value: "https://your-frontend.onrender.com"
      - key: FRONTEND_URL
        value: "https://your-frontend.onrender.com"
      - key: REDIS_URL
        fromService:
          name: merigaumata-redis
          type: redis
          property: connectionString
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: JWT_KEY_ID
        value: "auth-service-v1"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: "https://merigaumata-api.onrender.com/auth/google/callback"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: "ap-south-1"

  # ============================================
  # REDIS (Managed)
  # ============================================
  - name: merigaumata-redis
    type: redis
    region: singapore
    plan: free
    maxMemory: 50